name: Deploy PR to shared dev environment

# Adding the "deploy-dev" label to a PR (or pushing new commits while it's
# already applied) deploys that PR's actual branch/commit and points
# dev.coastalgrannys.com at it, so testers always check one stable URL
# regardless of which PR is currently being reviewed. Removing the label,
# closing, or merging the PR intentionally does nothing further — the
# domain just keeps serving whatever was last deployed until another PR
# claims it. There is no persistent "dev" branch; this is the only thing
# that drives the dev environment's content.

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  deploy-dev:
    if: contains(github.event.pull_request.labels.*.name, 'deploy-dev')
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Preview environment config
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt (Preview)
        id: deploy
        run: echo "url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})" >> "$GITHUB_OUTPUT"

      - name: Point dev.coastalgrannys.com at this deployment
        run: vercel alias set ${{ steps.deploy.outputs.url }} dev.coastalgrannys.com --token=${{ secrets.VERCEL_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 Deployed this PR to the shared dev environment: https://dev.coastalgrannys.com'
            })
